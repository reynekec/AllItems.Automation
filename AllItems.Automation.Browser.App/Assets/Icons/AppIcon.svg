<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#gradientBlue)" />

  <!-- Outer ring with subtle pattern -->
  <circle cx="128" cy="128" r="128" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2" />

  <!-- Gear element (left side - represents automation) -->
  <g filter="url(#shadow)">
    <!-- Outer gear circle -->
    <circle cx="85" cy="100" r="35" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2" />
    
    <!-- Gear teeth -->
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
      <line x1="85" y1="60" x2="85" y2="48" />
      <line x1="110" y1="67" x2="119" y2="58" />
      <line x1="125" y1="90" x2="137" y2="90" />
      <line x1="120" y1="120" x2="132" y2="132" />
      <line x1="90" y1="135" x2="90" y2="148" />
      <line x1="65" y1="130" x2="53" y2="142" />
      <line x1="52" y1="100" x2="40" y2="100" />
      <line x1="60" y1="72" x2="48" y2="60" />
    </g>
    
    <!-- Center circle -->
    <circle cx="85" cy="100" r="12" fill="url(#gradientAccent)" />
  </g>

  <!-- Circuit nodes (right side - represents platform) -->
  <g filter="url(#shadow)">
    <!-- Top node -->
    <circle cx="170" cy="80" r="8" fill="url(#gradientAccent)" />
    
    <!-- Middle node -->
    <circle cx="170" cy="128" r="8" fill="url(#gradientAccent)" />
    
    <!-- Bottom node -->
    <circle cx="170" cy="176" r="8" fill="url(#gradientAccent)" />
    
    <!-- Connection lines -->
    <line x1="170" y1="88" x2="170" y2="120" stroke="rgba(6,182,212,0.5)" stroke-width="2" stroke-linecap="round" />
    <line x1="170" y1="136" x2="170" y2="168" stroke="rgba(6,182,212,0.5)" stroke-width="2" stroke-linecap="round" />
    
    <!-- Horizontal connections -->
    <line x1="120" y1="100" x2="162" y2="80" stroke="rgba(6,182,212,0.3)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="120" y1="128" x2="162" y2="128" stroke="rgba(6,182,212,0.3)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="120" y1="156" x2="162" y2="176" stroke="rgba(6,182,212,0.3)" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- "AP" Text -->
  <text x="128" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700" text-anchor="middle" fill="#ffffff" opacity="0.95">AP</text>

  <!-- Highlight accent line -->
  <line x1="60" y1="210" x2="196" y2="210" stroke="url(#gradientAccent)" stroke-width="3" stroke-linecap="round" opacity="0.6" />

  <!-- Top accent -->
  <circle cx="128" cy="10" r="4" fill="url(#gradientAccent)" opacity="0.7" />
</svg>