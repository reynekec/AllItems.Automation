name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore WpfAutomation.sln

      - name: Build
        run: dotnet build WpfAutomation.sln --no-restore

      - name: Test
        run: dotnet test WpfAutomation.sln --no-build --verbosity normal
